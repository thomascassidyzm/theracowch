<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Playfulness Diary | Cowch</title>
    <meta name="theme-color" content="#1a1512">
    <link rel="icon" href="/icons/cowch-icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gabarito:wght@400;700;900&display=swap');

        :root {
            --bg-deep: #1a1512;
            --bg-card: #2a2320;
            --text-primary: #F5F0E8;
            --text-muted: rgba(245, 240, 232, 0.6);
            --coral: #D4896A;
            --coral-dark: #b86d4e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Gabarito', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        .back-btn {
            position: fixed;
            top: max(1rem, env(safe-area-inset-top));
            left: 1rem;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            z-index: 100;
        }

        .back-btn:hover { background: rgba(0,0,0,0.7); }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 5rem 1.5rem 3rem;
            padding-bottom: max(3rem, env(safe-area-inset-bottom));
        }

        .hero-icon {
            font-size: 4rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: var(--coral);
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .info-card {
            background: var(--bg-card);
            border: 4px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            line-height: 1.7;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .info-card strong {
            color: var(--coral);
        }

        .prompt-section {
            background: var(--bg-card);
            border: 4px solid var(--coral);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .prompt-section label {
            display: block;
            font-size: 1.1rem;
            font-weight: 900;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            background: var(--bg-deep);
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Gabarito', sans-serif;
            font-size: 1rem;
            resize: vertical;
            outline: none;
            margin-bottom: 1rem;
        }

        textarea:focus {
            border-color: var(--coral);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .action-btn {
            display: inline-block;
            background: var(--coral);
            color: var(--bg-deep);
            padding: 0.8rem 1.6rem;
            border: none;
            border-radius: 8px;
            font-family: 'Gabarito', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .action-btn:hover { opacity: 0.85; }

        .diary-entry {
            background: var(--bg-deep);
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 1.2rem;
            margin-bottom: 0.8rem;
        }

        .diary-date {
            font-weight: 700;
            color: var(--coral);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .diary-content {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
        }

        .entries-header {
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--coral);
            text-transform: uppercase;
            margin-bottom: 1rem;
            margin-top: 1.5rem;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem 1rem;
            font-size: 0.95rem;
        }

        .response-box {
            margin-top: 1rem;
            padding: 1.2rem;
            background: rgba(212, 137, 106, 0.1);
            border: 3px solid var(--coral);
            border-radius: 8px;
            color: var(--text-primary);
            line-height: 1.6;
            font-size: 0.95rem;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .response-box.visible { display: block; }

        .response-emoji {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; }
            .prompt-section { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <a href="/imagine/nurturing.html" class="back-btn">&larr; Back</a>

    <div class="container">
        <div class="hero-icon">📔</div>
        <h1>Playfulness Diary</h1>
        <p class="subtitle">Log your fun moments</p>

        <div class="info-card">
            Tracking <strong>playfulness</strong> helps you notice joy in your daily life. Write about what made you smile, laugh, or feel light today. Over time you'll see patterns of what brings you the most fun.
        </div>

        <div class="prompt-section">
            <label>What fun did you have today? What made you smile or laugh?</label>
            <textarea id="diaryInput" placeholder="Write about a fun moment..."></textarea>
            <button class="action-btn" onclick="saveDiaryEntry()">Save Entry</button>
            <div class="response-box" id="response-box">
                <span class="response-emoji" id="response-emoji"></span>
                <span id="response-text"></span>
            </div>
        </div>

        <div id="entriesContainer"></div>
    </div>

    <script>
        var responses = {
            laugh: [
                { emoji: '😂', text: 'Laughter is literally medicine — it releases endorphins and reduces stress hormones. Keep finding those moments!' },
                { emoji: '✨', text: '"A day without laughter is a day wasted." — Charlie Chaplin. Sounds like you didn\'t waste today!' }
            ],
            friend: [
                { emoji: '💛', text: 'Connection is one of the greatest sources of joy. The people who make us laugh are treasures.' },
                { emoji: '🤗', text: 'Shared fun creates bonds that last. Those moments with people we care about are what life is really about.' }
            ],
            nature: [
                { emoji: '🌿', text: 'Being in nature is proven to reduce anxiety and boost mood. Keep getting outside — your mind will thank you.' },
                { emoji: '🌞', text: '"In every walk with nature, one receives far more than they seek." — John Muir' }
            ],
            music: [
                { emoji: '🎵', text: 'Music activates the same reward centres in the brain as food and connection. Keep dancing, keep singing!' },
                { emoji: '🎶', text: '"Where words fail, music speaks." — Hans Christian Andersen. What a beautiful way to find joy.' }
            ],
            play: [
                { emoji: '🎮', text: 'Play isn\'t just for children — it\'s how adults recharge creativity and resilience. Well done for making time for it!' },
                { emoji: '🎨', text: '"We don\'t stop playing because we grow old; we grow old because we stop playing." — George Bernard Shaw' }
            ],
            food: [
                { emoji: '🍰', text: 'Savouring good food is a form of mindfulness. You were fully present in that moment — that\'s beautiful.' },
                { emoji: '☕', text: 'Finding joy in simple pleasures like food shows you\'re paying attention to the good stuff. Keep noticing!' }
            ],
            pet: [
                { emoji: '🐾', text: 'Animals bring unconditional joy. Studies show spending time with pets lowers cortisol and boosts oxytocin!' },
                { emoji: '❤️', text: 'The bond with a pet is pure and simple. What a wonderful source of daily happiness.' }
            ],
            general: [
                { emoji: '🌟', text: 'The fact that you noticed this moment of joy is powerful. Gratitude for small pleasures rewires your brain for happiness.' },
                { emoji: '💫', text: '"Happiness is not something ready-made. It comes from your own actions." — Dalai Lama. You\'re creating it right now.' },
                { emoji: '🎉', text: 'Every fun moment you record is proof that joy exists in your life. On harder days, read these back — they\'re your evidence.' },
                { emoji: '🌈', text: 'You\'re building a library of happy memories. Research shows that recalling positive experiences boosts mood just as much as the original event!' },
                { emoji: '☀️', text: 'Noticing playfulness in your day is a skill — and you\'re getting better at it. That\'s something to celebrate.' },
                { emoji: '🦋', text: '"Joy does not simply happen to us. We have to choose joy and keep choosing it every day." — Henri Nouwen. And you just did.' },
                { emoji: '💖', text: 'This is self-care in its purest form — choosing to remember what made you smile. Beautiful.' },
                { emoji: '🙌', text: 'Fun isn\'t frivolous — it\'s essential. You\'re recharging your emotional batteries right now.' }
            ]
        };

        function getResponse(text) {
            var lower = text.toLowerCase();

            if (lower.match(/laugh|funny|hilarious|giggle|crack up|comedy/)) {
                return pick(responses.laugh);
            }
            if (lower.match(/friend|mate|colleague|partner|family|mum|dad|sister|brother|kids|children/)) {
                return pick(responses.friend);
            }
            if (lower.match(/walk|park|garden|nature|tree|beach|sun|outside|hike|fresh air/)) {
                return pick(responses.nature);
            }
            if (lower.match(/music|song|dance|singing|playlist|concert|guitar|piano/)) {
                return pick(responses.music);
            }
            if (lower.match(/game|play|sport|football|tennis|board game|puzzle|video game/)) {
                return pick(responses.play);
            }
            if (lower.match(/food|cook|bake|eat|lunch|dinner|coffee|tea|cake|chocolate|restaurant/)) {
                return pick(responses.food);
            }
            if (lower.match(/dog|cat|pet|puppy|kitten|animal/)) {
                return pick(responses.pet);
            }

            return pick(responses.general);
        }

        function pick(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function showResponse(text) {
            var resp = getResponse(text);
            document.getElementById('response-emoji').textContent = resp.emoji;
            document.getElementById('response-text').textContent = resp.text;
            var box = document.getElementById('response-box');
            box.classList.remove('visible');
            // Force reflow for animation restart
            void box.offsetWidth;
            box.classList.add('visible');
        }

        function saveDiaryEntry() {
            var input = document.getElementById('diaryInput');
            var content = input.value.trim();

            if (!content) {
                alert('Write something first!');
                return;
            }

            var entries = JSON.parse(localStorage.getItem('diaryEntries') || '[]');
            entries.unshift({
                date: new Date().toLocaleDateString(),
                content: content
            });
            localStorage.setItem('diaryEntries', JSON.stringify(entries));

            showResponse(content);
            input.value = '';
            loadEntries();
        }

        function loadEntries() {
            var entries = JSON.parse(localStorage.getItem('diaryEntries') || '[]');
            var container = document.getElementById('entriesContainer');

            if (entries.length === 0) {
                container.innerHTML = '<div class="empty-state">No entries yet. Write your first one above!</div>';
                return;
            }

            container.innerHTML = '<div class="entries-header">Your Entries (' + entries.length + ')</div>' +
                entries.slice(0, 10).map(function(entry) {
                    return '<div class="diary-entry">' +
                        '<div class="diary-date">' + entry.date + '</div>' +
                        '<div class="diary-content">' + entry.content + '</div>' +
                    '</div>';
                }).join('');
        }

        loadEntries();
    </script>
</body>
</html>
