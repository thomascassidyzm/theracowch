<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Body Scan – cowch.app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1714;
            --surface: #252220;
            --surface2: #2e2b28;
            --accent: #d4826a;
            --accent-soft: #c4705840;
            --text: #f0ebe4;
            --text-muted: #9a9088;
            --region-idle: #3a3530;
            --region-active: #d4826a;
            --region-done: #6a9e7a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── SCREENS ── */
        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .screen.active {
            opacity: 1;
            pointer-events: all;
        }

        /* ── BACK BUTTON ── */
        .back-btn {
            position: fixed;
            top: 1.2rem;
            left: 1.2rem;
            background: var(--surface);
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: background 0.2s, color 0.2s;
        }
        .back-btn:hover { background: var(--surface2); color: var(--text); }

        /* ── INTRO SCREEN ── */
        #intro .icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            animation: breathe 4s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.08); opacity: 1; }
        }
        #intro h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.4rem;
            color: var(--text);
            margin-bottom: 0.5rem;
            text-align: center;
        }
        #intro .tagline {
            color: var(--text-muted);
            font-size: 1rem;
            text-align: center;
            max-width: 280px;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }
        .meta-pills {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 2.5rem;
        }
        .pill {
            background: var(--surface);
            border-radius: 2rem;
            padding: 0.35rem 0.9rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ── PRIMARY BUTTON ── */
        .btn-primary {
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 3rem;
            padding: 1rem 2.8rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 20px #d4826a30;
        }
        .btn-primary:active { transform: scale(0.96); }

        /* ── GHOST BUTTON ── */
        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--surface2);
            border-radius: 3rem;
            padding: 0.7rem 1.8rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .btn-ghost:hover { background: var(--surface); color: var(--text); }

        /* ── MAIN EXERCISE SCREEN ── */
        #main {
            gap: 0;
            justify-content: flex-start;
            padding-top: 5rem;
        }

        .region-label {
            font-family: 'DM Serif Display', serif;
            font-size: 1.8rem;
            text-align: center;
            color: var(--text);
            min-height: 2.4rem;
            transition: opacity 0.4s;
        }

        .instruction {
            font-size: 0.95rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 0.4rem;
            margin-bottom: 1.5rem;
            min-height: 1.4rem;
            transition: opacity 0.4s;
        }

        /* SVG Body */
        .body-wrap {
            position: relative;
            width: 160px;
            flex-shrink: 0;
        }
        .body-wrap svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 0px transparent);
            transition: filter 0.6s;
        }
        .body-wrap.glowing svg {
            filter: drop-shadow(0 0 18px #d4826a55);
        }

        .body-region {
            fill: var(--region-idle);
            transition: fill 0.6s ease, opacity 0.4s;
            cursor: default;
        }
        .body-region.active {
            fill: var(--region-active);
            animation: pulse-region 1.5s ease-in-out infinite;
        }
        .body-region.done {
            fill: var(--region-done);
            opacity: 0.7;
        }
        @keyframes pulse-region {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Timer ring */
        .timer-wrap {
            margin-top: 1.5rem;
            position: relative;
            width: 100px;
            height: 100px;
            flex-shrink: 0;
        }
        .timer-wrap svg {
            transform: rotate(-90deg);
            width: 100px;
            height: 100px;
        }
        .timer-bg { fill: none; stroke: var(--surface2); stroke-width: 6; }
        .timer-fill {
            fill: none;
            stroke: var(--accent);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 251;
            stroke-dashoffset: 251;
            transition: stroke-dashoffset 0.2s linear, stroke 0.4s;
        }
        .timer-fill.release { stroke: var(--region-done); }
        .timer-number {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Serif Display', serif;
            font-size: 1.9rem;
            color: var(--text);
        }
        .timer-phase {
            position: absolute;
            bottom: -1.4rem;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
        }

        /* Progress dots */
        .progress-dots {
            display: flex;
            gap: 0.5rem;
            margin-top: 2.8rem;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--surface2);
            transition: background 0.4s, transform 0.3s;
        }
        .dot.done { background: var(--region-done); }
        .dot.active { background: var(--accent); transform: scale(1.3); }

        /* Controls */
        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 1.8rem;
        }

        /* ── COMPLETE SCREEN ── */
        #complete .icon {
            font-size: 3.5rem;
            margin-bottom: 1.2rem;
        }
        #complete h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 0.6rem;
        }
        #complete p {
            color: var(--text-muted);
            text-align: center;
            max-width: 260px;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }
        .complete-stats {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        .stat {
            background: var(--surface);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            text-align: center;
        }
        .stat-num {
            font-family: 'DM Serif Display', serif;
            font-size: 1.8rem;
            color: var(--accent);
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }
    </style>
</head>
<body>

<button class="back-btn" onclick="goBack()">←</button>

<!-- INTRO -->
<div class="screen active" id="intro">
    <div class="icon">🧘</div>
    <h1>Body Scan</h1>
    <p class="tagline">Release tension region by region with guided awareness</p>
    <div class="meta-pills">
        <span class="pill">5 min</span>
        <span class="pill">7 regions</span>
        <span class="pill">Body</span>
    </div>
    <button class="btn-primary" onclick="startExercise()">Begin</button>
</div>

<!-- MAIN -->
<div class="screen" id="main">
    <div class="region-label" id="regionLabel">Feet & Ankles</div>
    <div class="instruction" id="instruction">Get comfortable and take a breath</div>

    <div class="body-wrap" id="bodyWrap">
        <svg viewBox="0 0 160 340" xmlns="http://www.w3.org/2000/svg">
            <!-- Head -->
            <ellipse id="r-head" class="body-region" cx="80" cy="28" rx="26" ry="26"/>
            <!-- Neck -->
            <rect id="r-neck" class="body-region" x="70" y="52" width="20" height="16" rx="6"/>
            <!-- Shoulders -->
            <path id="r-shoulders" class="body-region" d="M30 72 Q80 62 130 72 L128 96 Q80 86 32 96 Z"/>
            <!-- Arms (both) -->
            <path id="r-arms" class="body-region" d="M28 76 Q14 100 18 130 Q22 148 30 150 L36 148 Q30 128 34 104 L32 96 Z M132 76 Q146 100 142 130 Q138 148 130 150 L124 148 Q130 128 126 104 L128 96 Z"/>
            <!-- Chest / torso -->
            <rect id="r-chest" class="body-region" x="38" y="96" width="84" height="60" rx="12"/>
            <!-- Stomach -->
            <rect id="r-stomach" class="body-region" x="40" y="158" width="80" height="52" rx="10"/>
            <!-- Legs -->
            <path id="r-legs" class="body-region" d="M40 212 L52 212 L60 290 L50 300 Q44 302 42 296 Z M120 212 L108 212 L100 290 L110 300 Q116 302 118 296 Z M52 212 L108 212 L106 260 L54 260 Z"/>
            <!-- Feet -->
            <path id="r-feet" class="body-region" d="M38 296 Q30 300 28 310 L62 310 L62 296 Z M122 296 Q130 300 132 310 L98 310 L98 296 Z"/>
        </svg>
    </div>

    <div class="timer-wrap">
        <svg viewBox="0 0 100 100">
            <circle class="timer-bg" cx="50" cy="50" r="40"/>
            <circle class="timer-fill" id="timerFill" cx="50" cy="50" r="40"/>
        </svg>
        <div class="timer-number" id="timerNum">5</div>
        <div class="timer-phase" id="timerPhase">tense</div>
    </div>

    <div class="progress-dots" id="dots"></div>

    <div class="controls">
        <button class="btn-ghost" id="pauseBtn" onclick="togglePause()">Pause</button>
        <button class="btn-ghost" onclick="skipRegion()">Skip →</button>
    </div>
</div>

<!-- COMPLETE -->
<div class="screen" id="complete">
    <div class="icon">✨</div>
    <h1>Deeply Relaxed</h1>
    <p>You've moved through your whole body with care. Notice how you feel right now.</p>
    <div class="complete-stats">
        <div class="stat">
            <div class="stat-num">7</div>
            <div class="stat-label">regions</div>
        </div>
        <div class="stat">
            <div class="stat-num">5</div>
            <div class="stat-label">minutes</div>
        </div>
    </div>
    <button class="btn-primary" onclick="window.location.href='/app.html'">Done</button>
</div>

<script>
    const REGIONS = [
        { id: 'r-feet',      label: 'Feet & Ankles',   tense: 'Curl your toes tight',        release: 'Let your feet soften and spread' },
        { id: 'r-legs',      label: 'Legs',             tense: 'Squeeze your thighs and calves', release: 'Feel the weight of your legs sink' },
        { id: 'r-stomach',   label: 'Stomach',          tense: 'Tighten your belly muscles',  release: 'Let your belly go completely soft' },
        { id: 'r-chest',     label: 'Chest',            tense: 'Take a deep breath and hold', release: 'Breathe out slowly… let go' },
        { id: 'r-arms',      label: 'Arms & Hands',     tense: 'Make tight fists, clench arms', release: 'Open your hands and let arms drop' },
        { id: 'r-shoulders', label: 'Shoulders',        tense: 'Shrug shoulders to your ears', release: 'Drop and roll them back gently' },
        { id: 'r-head',      label: 'Face & Head',      tense: 'Scrunch your face tightly',   release: 'Smooth out every muscle in your face' },
    ];

    const TENSE_SECS  = 5;
    const RELEASE_SECS = 8;

    let currentRegion = 0;
    let phase = 'tense'; // 'tense' | 'release'
    let timeLeft = TENSE_SECS;
    let ticker = null;
    let paused = false;

    function goBack() {
        window.location.href = '/app.html';
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function buildDots() {
        const wrap = document.getElementById('dots');
        wrap.innerHTML = '';
        REGIONS.forEach((_, i) => {
            const d = document.createElement('div');
            d.className = 'dot' + (i === 0 ? ' active' : '');
            d.id = 'dot-' + i;
            wrap.appendChild(d);
        });
    }

    function updateDots() {
        REGIONS.forEach((_, i) => {
            const d = document.getElementById('dot-' + i);
            d.className = 'dot' + (i < currentRegion ? ' done' : i === currentRegion ? ' active' : '');
        });
    }

    function highlightRegion(idx, phase) {
        REGIONS.forEach((r, i) => {
            const el = document.getElementById(r.id);
            el.className = 'body-region' + (i < idx ? ' done' : i === idx ? ' active' : '');
        });
        document.getElementById('bodyWrap').classList.toggle('glowing', phase === 'tense');
    }

    function updateTimer() {
        const total = phase === 'tense' ? TENSE_SECS : RELEASE_SECS;
        const progress = 1 - (timeLeft / total);
        const circumference = 251;
        const offset = circumference - (progress * circumference);
        const fill = document.getElementById('timerFill');
        fill.style.strokeDashoffset = offset;
        fill.className = 'timer-fill' + (phase === 'release' ? ' release' : '');
        document.getElementById('timerNum').textContent = timeLeft;
        document.getElementById('timerPhase').textContent = phase === 'tense' ? 'TENSE' : 'RELEASE';
    }

    function setRegion(idx) {
        currentRegion = idx;
        phase = 'tense';
        timeLeft = TENSE_SECS;
        const r = REGIONS[idx];
        document.getElementById('regionLabel').textContent = r.label;
        document.getElementById('instruction').textContent = r.tense;
        highlightRegion(idx, 'tense');
        updateDots();
        updateTimer();
    }

    function tick() {
        if (paused) return;
        timeLeft--;
        if (timeLeft <= 0) {
            if (phase === 'tense') {
                phase = 'release';
                timeLeft = RELEASE_SECS;
                const r = REGIONS[currentRegion];
                document.getElementById('instruction').textContent = r.release;
                highlightRegion(currentRegion, 'release');
            } else {
                // next region
                if (currentRegion + 1 >= REGIONS.length) {
                    finish();
                    return;
                }
                setRegion(currentRegion + 1);
            }
        }
        updateTimer();
    }

    function startExercise() {
        showScreen('main');
        buildDots();
        setRegion(0);
        ticker = setInterval(tick, 1000);
    }

    function togglePause() {
        paused = !paused;
        document.getElementById('pauseBtn').textContent = paused ? 'Resume' : 'Pause';
    }

    function skipRegion() {
        if (currentRegion + 1 >= REGIONS.length) {
            finish();
            return;
        }
        setRegion(currentRegion + 1);
    }

    function finish() {
        clearInterval(ticker);
        // mark all done
        REGIONS.forEach(r => {
            document.getElementById(r.id).className = 'body-region done';
        });
        setTimeout(() => showScreen('complete'), 600);
    }
</script>
</body>
</html>
