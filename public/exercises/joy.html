<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Joy Bubbles - Memory Match | Cowch</title>
    <meta name="theme-color" content="#fef3e2">
    <link rel="icon" href="/icons/cowch-icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gabarito:wght@400;700;900&display=swap');

        :root {
            --bg-warm: #fef3e2;
            --text-dark: #4a3f35;
            --text-muted: #8a7a6a;
            --coral: #D4896A;
            --green: #7EA88B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Gabarito', sans-serif;
            background: linear-gradient(180deg, #fef3e2 0%, #fde4c4 50%, #fcd5a5 100%);
            color: var(--text-dark);
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-btn {
            position: fixed;
            top: max(1rem, env(safe-area-inset-top));
            left: 1rem;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0,0,0,0.1);
            color: var(--text-dark);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            z-index: 100;
        }

        .back-btn:hover { background: rgba(255,255,255,0.9); }

        /* Screens */
        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 50;
        }

        .screen.active { opacity: 1; pointer-events: auto; }

        .intro-screen { background: rgba(254, 243, 226, 0.95); text-align: center; }

        .intro-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .intro-title {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 900;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ff9ecd, #c4a7e7, #87d3f8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .intro-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            max-width: 300px;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .start-btn {
            background: var(--coral);
            border: none;
            color: white;
            padding: 1.25rem 3rem;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: 900;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 8px 32px rgba(212, 137, 106, 0.3);
        }

        .start-btn:hover { transform: translateY(-2px); }

        /* Game area */
        .game-header {
            width: 100%;
            padding: max(4.5rem, env(safe-area-inset-top) + 3rem) 1.5rem 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .game-status {
            font-size: 1rem;
            font-weight: 700;
            color: var(--coral);
        }

        .game-moves {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .game-message {
            text-align: center;
            padding: 0.75rem;
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--coral);
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 0.5rem 1rem;
            max-width: 400px;
            width: 100%;
            flex: 1;
            align-content: center;
        }

        .bubble {
            aspect-ratio: 1;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            transition: all 0.3s ease;
            position: relative;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8) 0%, transparent 50%);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.5), 0 4px 15px rgba(0,0,0,0.1);
            user-select: none;
            -webkit-user-select: none;
        }

        .bubble::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 25%;
            height: 20%;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        .bubble.hidden-symbol .bubble-symbol { visibility: hidden; }
        .bubble.revealed .bubble-symbol { visibility: visible; }
        .bubble.matched {
            opacity: 0.3;
            pointer-events: none;
            transform: scale(0.8);
        }

        .bubble.wrong {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .bubble.peek .bubble-symbol { visibility: visible; }

        .bubble:active { transform: scale(0.9); }

        .bubble-symbol {
            position: relative;
            z-index: 2;
        }

        .game-footer {
            padding: 1rem;
            padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
            display: flex;
            gap: 0.75rem;
            z-index: 10;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .btn-play-again {
            background: var(--coral);
            color: white;
            border-color: var(--coral);
        }

        .btn-done {
            background: rgba(255,255,255,0.7);
            color: var(--text-dark);
        }

        /* Complete screen */
        .complete-screen { background: rgba(254, 243, 226, 0.95); text-align: center; }

        .complete-icon { font-size: 4rem; margin-bottom: 1rem; }

        .complete-title {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 900;
            color: var(--coral);
            margin-bottom: 0.5rem;
        }

        .complete-message {
            font-size: 1rem;
            color: var(--text-muted);
            max-width: 300px;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }

        .complete-stat {
            font-size: 1.1rem;
            font-weight: 700;
            color: #c4a7e7;
            margin-bottom: 2rem;
        }

        .finish-btn {
            background: var(--coral);
            border: none;
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 900;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .play-again-btn {
            background: transparent;
            border: 2px solid var(--coral);
            color: var(--coral);
            padding: 0.75rem 2rem;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <a href="/imagine/nurturing.html" class="back-btn">← Back</a>

    <div class="container">
        <!-- INTRO -->
        <div class="screen intro-screen active" id="intro-screen">
            <div class="intro-icon">🫧</div>
            <h1 class="intro-title">Joy Bubbles</h1>
            <p class="intro-subtitle">A memory matching game! Symbols appear in bubbles for 7 seconds — memorise them, then find the matching pairs.</p>
            <button class="start-btn" id="start-btn">Let's Play!</button>
        </div>

        <!-- GAME -->
        <div id="game-screen" style="display:none; width:100%; height:100%; flex-direction:column; align-items:center;">
            <div class="game-header">
                <div class="game-status">Pairs: <span id="pairs-found">0</span>/8</div>
                <div class="game-moves">Moves: <span id="move-count">0</span></div>
            </div>
            <div class="game-message" id="game-message">Memorise the symbols!</div>
            <div class="grid" id="grid"></div>
            <div class="game-footer">
                <button class="btn btn-done" id="quit-btn">I'm Done</button>
            </div>
        </div>

        <!-- COMPLETE -->
        <div class="screen complete-screen" id="complete-screen">
            <div class="complete-icon">🎉</div>
            <h2 class="complete-title">Well Done!</h2>
            <p class="complete-message">Play is essential. You just gave yourself permission to enjoy something fun. That's self-care.</p>
            <div class="complete-stat" id="complete-stat"></div>
            <button class="finish-btn" id="finish-btn">Done</button>
            <button class="play-again-btn" id="play-again-btn">Play Again</button>
        </div>
    </div>

    <script>
        var symbols = ['🌸', '🦋', '⭐', '🌈', '🎵', '💎', '🔥', '🍀', '🎯', '🌙', '❄️', '🎪'];
        var bubbleColors = [
            'rgba(255, 158, 205, 0.6)',
            'rgba(135, 211, 248, 0.6)',
            'rgba(196, 167, 231, 0.6)',
            'rgba(255, 224, 102, 0.6)',
            'rgba(152, 216, 170, 0.6)',
            'rgba(255, 179, 102, 0.6)'
        ];

        var cards = [];
        var flipped = [];
        var matched = 0;
        var moves = 0;
        var locked = true;

        function shuffle(arr) {
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = arr[i]; arr[i] = arr[j]; arr[j] = temp;
            }
            return arr;
        }

        function createGame() {
            var grid = document.getElementById('grid');
            grid.innerHTML = '';
            cards = [];
            flipped = [];
            matched = 0;
            moves = 0;
            locked = true;

            document.getElementById('pairs-found').textContent = '0';
            document.getElementById('move-count').textContent = '0';
            document.getElementById('game-message').textContent = 'Memorise the symbols!';

            // Pick 8 random symbols for 16 cards (4x4)
            var picked = shuffle(symbols.slice()).slice(0, 8);
            var deck = shuffle(picked.concat(picked));

            deck.forEach(function(symbol, i) {
                var bubble = document.createElement('div');
                bubble.className = 'bubble peek';
                bubble.style.backgroundColor = bubbleColors[Math.floor(Math.random() * bubbleColors.length)];
                bubble.setAttribute('data-index', i);
                bubble.setAttribute('data-symbol', symbol);

                bubble.innerHTML = '<span class="bubble-symbol">' + symbol + '</span>';

                bubble.addEventListener('click', function() { handleTap(i); });
                bubble.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    handleTap(i);
                }, { passive: false });

                grid.appendChild(bubble);
                cards.push(bubble);
            });

            // Show symbols for 7 seconds then hide
            setTimeout(function() {
                cards.forEach(function(card) {
                    card.classList.remove('peek');
                    card.classList.add('hidden-symbol');
                });
                locked = false;
                document.getElementById('game-message').textContent = 'Find the matching pairs!';
            }, 7000);
        }

        function handleTap(index) {
            if (locked) return;
            var card = cards[index];
            if (card.classList.contains('matched')) return;
            if (card.classList.contains('revealed')) return;
            if (flipped.length >= 2) return;

            // Reveal
            card.classList.remove('hidden-symbol');
            card.classList.add('revealed');
            flipped.push(index);

            if (flipped.length === 2) {
                moves++;
                document.getElementById('move-count').textContent = moves;

                var a = cards[flipped[0]];
                var b = cards[flipped[1]];

                if (a.getAttribute('data-symbol') === b.getAttribute('data-symbol')) {
                    // Match!
                    matched++;
                    document.getElementById('pairs-found').textContent = matched;
                    document.getElementById('game-message').textContent = 'Nice match! 🎉';

                    setTimeout(function() {
                        a.classList.add('matched');
                        b.classList.add('matched');
                        flipped = [];

                        if (matched === 8) {
                            setTimeout(gameComplete, 500);
                        }
                    }, 500);
                } else {
                    // No match
                    locked = true;
                    document.getElementById('game-message').textContent = 'Not quite — try again!';
                    a.classList.add('wrong');
                    b.classList.add('wrong');

                    setTimeout(function() {
                        a.classList.remove('revealed', 'wrong');
                        a.classList.add('hidden-symbol');
                        b.classList.remove('revealed', 'wrong');
                        b.classList.add('hidden-symbol');
                        flipped = [];
                        locked = false;
                        document.getElementById('game-message').textContent = 'Find the matching pairs!';
                    }, 800);
                }
            }
        }

        function gameComplete() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('complete-screen').classList.add('active');
            document.getElementById('complete-stat').textContent = 'All 8 pairs matched in ' + moves + ' moves!';
        }

        function startGame() {
            document.getElementById('intro-screen').classList.remove('active');
            document.getElementById('game-screen').style.display = 'flex';
            createGame();
        }

        function playAgain() {
            document.getElementById('complete-screen').classList.remove('active');
            document.getElementById('game-screen').style.display = 'flex';
            createGame();
        }

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('quit-btn').addEventListener('click', function() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('complete-stat').textContent = 'You matched ' + matched + ' pair' + (matched !== 1 ? 's' : '') + ' in ' + moves + ' moves!';
            document.getElementById('complete-screen').classList.add('active');
        });
        document.getElementById('finish-btn').addEventListener('click', function() {
            window.location.href = '/imagine/nurturing.html';
        });
        document.getElementById('play-again-btn').addEventListener('click', playAgain);
    </script>
</body>
</html>
