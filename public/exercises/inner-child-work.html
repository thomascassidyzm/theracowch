<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Inner Child Work | Cowch</title>
    <meta name="theme-color" content="#1a1512">
    <link rel="icon" href="/icons/cowch-icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gabarito:wght@400;700;900&display=swap');

        :root {
            --bg-deep: #1a1512;
            --bg-card: #2a2320;
            --text-primary: #F5F0E8;
            --text-muted: rgba(245, 240, 232, 0.6);
            --coral: #D4896A;
            --coral-dark: #b86d4e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Gabarito', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        .back-btn {
            position: fixed;
            top: max(1rem, env(safe-area-inset-top));
            left: 1rem;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            z-index: 100;
        }

        .back-btn:hover { background: rgba(0,0,0,0.7); }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 5rem 1.5rem 3rem;
            padding-bottom: max(3rem, env(safe-area-inset-bottom));
        }

        .hero-icon {
            font-size: 4rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: var(--coral);
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .info-card {
            background: var(--bg-card);
            border: 4px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            line-height: 1.7;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .info-card strong {
            color: var(--coral);
        }

        .joy-link {
            display: block;
            background: var(--bg-card);
            border: 4px solid var(--coral);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 900;
            font-size: 1.1rem;
            text-align: center;
            transition: opacity 0.2s;
        }

        .joy-link:hover { opacity: 0.85; }

        .joy-link span {
            color: var(--coral);
        }

        .question-card {
            background: var(--bg-card);
            border: 4px solid var(--coral);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .question-card h2 {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: 1.2rem;
            text-align: center;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-bottom: 0.6rem;
            background: var(--bg-deep);
            border: 3px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: var(--text-muted);
            font-family: 'Gabarito', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .option-btn:hover {
            border-color: var(--coral);
            color: var(--text-primary);
        }

        .option-btn.selected {
            border-color: var(--coral);
            background: rgba(212, 137, 106, 0.15);
            color: var(--coral);
        }

        .response-box {
            margin-top: 1.2rem;
            padding: 1.2rem;
            background: rgba(212, 137, 106, 0.1);
            border: 3px solid var(--coral);
            border-radius: 8px;
            color: var(--text-primary);
            line-height: 1.6;
            font-size: 0.95rem;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .response-box.visible { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; }
            .prompts-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <a href="/imagine/nurturing.html" class="back-btn">&larr; Back</a>

    <div class="container">
        <div class="hero-icon">🧒</div>
        <h1>Inner Child Work</h1>
        <p class="subtitle">Reconnect with your playful self</p>

        <div class="info-card">
            Explore these prompts to reconnect with your <strong>playful, creative inner child</strong>. No pressure, no judgment. Tap a prompt to mark it complete.
        </div>

        <a href="/exercises/joy.html" class="joy-link">
            <span>Try Joy Bubbles Exercise &rarr;</span>
        </a>

        <div class="question-card">
            <h2>How in tune are you with your inner child?</h2>
            <button class="option-btn" onclick="selectOption(this, 'not-at-all')">Not at all</button>
            <button class="option-btn" onclick="selectOption(this, 'somewhat')">Somewhat</button>
            <button class="option-btn" onclick="selectOption(this, 'very-much')">Very much so</button>
            <div class="response-box" id="response-box"></div>
        </div>
    </div>

    <script>
        var responses = {
            'not-at-all': [
                "That's completely okay — and honestly, really common. Many of us lose touch with our inner child as we take on adult responsibilities. The fact that you're here exploring this is already a step back towards that playful part of yourself. Start small: what's one thing that made you laugh as a kid?",
                "No judgment at all. Life has a way of burying our playful side under stress and expectations. But your inner child is still there, waiting. Try doing one tiny silly thing today — even if it feels strange. That's where reconnection begins.",
                "Most adults feel this way. We're taught to be serious, productive, responsible. But play isn't childish — it's essential for creativity and wellbeing. You don't need to feel in tune yet. Just be curious about what fun might look like for you."
            ],
            'somewhat': [
                "That's a great place to be! You haven't lost the connection entirely — you just need to nurture it. Think about the moments when you feel most free and light. Those are your inner child speaking. Can you create more of those moments this week?",
                "You're already halfway there. 'Somewhat' means there are moments when your playful side comes through. Pay attention to when that happens — what triggers it? Those are clues to what your inner child needs more of.",
                "That awareness is really valuable. Many people don't even notice their inner child. The next step is giving yourself permission to play without guilt. Schedule fun the same way you schedule work — it's that important."
            ],
            'very-much': [
                "That's wonderful! Being connected to your inner child means you have access to creativity, spontaneity, and joy that many adults struggle to find. Keep protecting that part of yourself — it's one of your greatest strengths.",
                "Amazing. People who stay connected to their playful side tend to be more resilient, more creative, and more emotionally flexible. You're doing something right — keep playing, keep laughing, keep being you.",
                "What a gift. Your inner child is alive and well, and that means you have a natural source of joy and wonder. Share that energy with others — playfulness is contagious, and the world needs more of it."
            ]
        };

        function selectOption(btn, choice) {
            // Clear previous selection
            document.querySelectorAll('.option-btn').forEach(function(b) {
                b.classList.remove('selected');
            });
            btn.classList.add('selected');

            // Pick a random response
            var pool = responses[choice];
            var text = pool[Math.floor(Math.random() * pool.length)];

            var box = document.getElementById('response-box');
            box.textContent = text;
            box.classList.remove('visible');
            void box.offsetWidth;
            box.classList.add('visible');

            localStorage.setItem('innerChildChoice', choice);
        }

        // Load saved choice
        (function() {
            var saved = localStorage.getItem('innerChildChoice');
            if (saved) {
                var btns = document.querySelectorAll('.option-btn');
                var map = { 'not-at-all': 0, 'somewhat': 1, 'very-much': 2 };
                if (map[saved] !== undefined && btns[map[saved]]) {
                    btns[map[saved]].classList.add('selected');
                }
            }
        })();
    </script>
</body>
</html>
