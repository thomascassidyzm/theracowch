<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two people hugging and supporting each other">

  <!-- Sage figure: right lobe of heart + lower-right body, drawn first so the
       brown arm can sit on top of it. -->
  <path d="
      M 256 470
      C 350 470, 410 440, 440 380
      C 470 320, 460 250, 410 220
      C 360 195, 305 220, 290 270
      C 280 305, 270 340, 270 380
      C 270 420, 260 450, 256 470
      Z"
    fill="#9AAA82"/>

  <!-- Sage head — slightly right of centre, just below the brown head -->
  <circle cx="328" cy="218" r="46" fill="#9AAA82"/>

  <!-- Brown figure: left lobe of heart + lower-left body + an arm that
       arches up and over the right shoulder of the sage figure. -->
  <path d="
      M 256 470
      C 162 470, 102 440, 72 380
      C 42 320, 52 250, 102 220
      C 152 195, 207 220, 222 270
      C 232 305, 242 340, 242 380
      C 242 420, 252 450, 256 470 Z

      M 226 252
      C 260 232, 305 232, 348 254
      C 392 276, 422 308, 414 348
      C 408 380, 374 388, 348 372
      C 322 356, 300 332, 280 308
      C 262 286, 244 270, 226 252 Z"
    fill="#8A7356"/>

  <!-- Brown head — upper left -->
  <circle cx="196" cy="178" r="54" fill="#8A7356"/>

  <!-- White separation curve where the brown body / arm meets the sage figure -->
  <path d="
      M 102 320
      C 170 360, 240 365, 300 340
      C 350 320, 388 296, 414 270"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="20"
    stroke-linecap="round"/>

</svg>
