<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two people hugging and supporting each other">

  <!-- Sage body — right lobe + lower-right of the heart (back layer) -->
  <path d="
      M 256 470
      C 360 470, 432 416, 448 348
      C 462 280, 432 220, 376 208
      C 320 198, 280 230, 270 280
      C 264 320, 262 380, 256 470 Z"
    fill="#9AAA82"/>

  <!-- Brown body — left lobe + lower-left of the heart -->
  <path d="
      M 256 470
      C 152 470, 80 416, 64 348
      C 50 280, 80 220, 136 208
      C 192 198, 232 230, 242 280
      C 248 320, 250 380, 256 470 Z"
    fill="#8A7356"/>

  <!-- Brown arm — arches up and over the sage figure's right shoulder -->
  <path d="
      M 226 248
      C 270 220, 320 220, 360 248
      C 396 272, 416 304, 408 340
      C 400 372, 366 380, 340 364
      C 314 348, 290 322, 270 300
      C 252 282, 240 268, 226 248 Z"
    fill="#8A7356"/>

  <!-- Sage arm — sweeps all the way across the lower body, right-to-left,
       wrapping around the brown figure -->
  <path d="
      M 348 332
      C 286 372, 200 388, 132 366
      C 102 354, 78 330, 96 312
      C 116 294, 168 302, 218 318
      C 270 334, 320 342, 348 332 Z"
    fill="#9AAA82"/>

  <!-- Brown head — upper left -->
  <circle cx="196" cy="178" r="54" fill="#8A7356"/>

  <!-- Sage head — tucked in to the right and slightly below -->
  <circle cx="328" cy="218" r="46" fill="#9AAA82"/>

</svg>
