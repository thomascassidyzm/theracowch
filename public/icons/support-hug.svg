  <!-- Right person body / arm -->
  <path d="M360 225
           C390 260 390 335 355 390
           C335 420 305 438 282 448
           C275 410 275 365 280 320
           C230 327 175 310 140 280
           C150 330 180 390 235 430
           C215 445 180 430 150 400
           C105 355 100 285 138 240
           C160 275 220 300 280 292
           C325 286 350 260 360 225Z"
