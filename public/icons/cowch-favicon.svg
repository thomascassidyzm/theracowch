<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="headClipPinkFav">
      <circle cx="32" cy="36" r="18"/>
    </clipPath>
  </defs>

  <rect width="64" height="64" rx="14" ry="14" fill="#2D5C38"/>

  <g transform="translate(32, 36)">
    <!-- Pink horns with cream tips -->
    <ellipse cx="-7" cy="-17" rx="2" ry="4" fill="#F7C9B6" transform="rotate(-14 -7 -17)"/>
    <ellipse cx="7" cy="-17" rx="2" ry="4" fill="#F7C9B6" transform="rotate(14 7 -17)"/>
    <ellipse cx="-7" cy="-19" rx="1.2" ry="2" fill="#FFF0E4"/>
    <ellipse cx="7" cy="-19" rx="1.2" ry="2" fill="#FFF0E4"/>

    <!-- White fringe tuft -->
    <circle cx="-2" cy="-17" r="2.4" fill="#FFFDF9"/>
    <circle cx="0" cy="-18.5" r="2.6" fill="#FFFDF9"/>
    <circle cx="2.2" cy="-17" r="2.4" fill="#FFFDF9"/>

    <!-- Pink ears -->
    <ellipse cx="-16" cy="-5" rx="5" ry="3.2" fill="#F7B2C5" transform="rotate(-32 -16 -5)"/>
    <ellipse cx="16" cy="-5" rx="5" ry="3.2" fill="#F7B2C5" transform="rotate(32 16 -5)"/>
    <ellipse cx="-15" cy="-4" rx="2.6" ry="1.6" fill="#E48CA5" transform="rotate(-32 -15 -4)"/>
    <ellipse cx="15" cy="-4" rx="2.6" ry="1.6" fill="#E48CA5" transform="rotate(32 15 -4)"/>

    <!-- Cream head -->
    <circle cx="0" cy="0" r="18" fill="#FFF6EC"/>
  </g>

  <!-- Dairy spots -->
  <g clip-path="url(#headClipPinkFav)" fill="#F7B7A6">
    <ellipse cx="24" cy="28" rx="5" ry="4" transform="rotate(-20 24 28)"/>
    <ellipse cx="42" cy="40" rx="4" ry="3.5" transform="rotate(18 42 40)"/>
    <ellipse cx="24" cy="46" rx="3.5" ry="3" transform="rotate(-20 24 46)"/>
  </g>

  <!-- Features -->
  <g transform="translate(32, 36)">
    <!-- Pink round glasses -->
    <circle cx="-6" cy="-1.5" r="5" fill="#FFF8F0" opacity="0.45"/>
    <circle cx="-6" cy="-1.5" r="5" fill="none" stroke="#E94F7A" stroke-width="1.4"/>
    <circle cx="6" cy="-1.5" r="5" fill="#FFF8F0" opacity="0.45"/>
    <circle cx="6" cy="-1.5" r="5" fill="none" stroke="#E94F7A" stroke-width="1.4"/>
    <path d="M -1.2 -1.8 Q 0 -3 1.2 -1.8" stroke="#E94F7A" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Closed happy eyes -->
    <path d="M -8 -1.5 Q -6 -4.5 -4 -1.5" stroke="#2D2D2D" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M 4 -1.5 Q 6 -4.5 8 -1.5" stroke="#2D2D2D" stroke-width="1" fill="none" stroke-linecap="round"/>

    <!-- Blush -->
    <circle cx="-12" cy="5" r="2.4" fill="#F7B7A6" opacity="0.85"/>
    <circle cx="12" cy="5" r="2.4" fill="#F7B7A6" opacity="0.85"/>

    <!-- Muzzle + open grin -->
    <ellipse cx="0" cy="6" rx="8" ry="5" fill="#FFE3D4"/>
    <ellipse cx="-2.5" cy="5" rx="0.8" ry="0.6" fill="#2D2D2D"/>
    <ellipse cx="2.5" cy="5" rx="0.8" ry="0.6" fill="#2D2D2D"/>
    <path d="M -4.5 9.5 Q 0 14.5 4.5 9.5 Q 2.5 11.8 0 11.8 Q -2.5 11.8 -4.5 9.5 Z" fill="#2D2D2D"/>
    <path d="M -1.8 11 Q 0 13 1.8 11 Q 1 12.2 0 12.2 Q -1 12.2 -1.8 11 Z" fill="#F48AA1"/>
  </g>
</svg>
