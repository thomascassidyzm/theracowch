<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Kawaii chibi cow — simplified for favicon -->
  <rect width="64" height="64" rx="14" ry="14" fill="#2D5C38"/>

  <g transform="translate(32, 36)">
    <!-- Tiny horns -->
    <ellipse cx="-7" cy="-17" rx="2" ry="4" fill="#F5F0E8" transform="rotate(-10 -7 -17)"/>
    <ellipse cx="7" cy="-17" rx="2" ry="4" fill="#F5F0E8" transform="rotate(10 7 -17)"/>

    <!-- Ears -->
    <ellipse cx="-16" cy="-5" rx="5" ry="3.2" fill="#F37A53" transform="rotate(-28 -16 -5)"/>
    <ellipse cx="16" cy="-5" rx="5" ry="3.2" fill="#F37A53" transform="rotate(28 16 -5)"/>
    <ellipse cx="-15" cy="-4" rx="2.6" ry="1.6" fill="#FFB7D0" transform="rotate(-28 -15 -4)"/>
    <ellipse cx="15" cy="-4" rx="2.6" ry="1.6" fill="#FFB7D0" transform="rotate(28 15 -4)"/>

    <!-- Head -->
    <circle cx="0" cy="0" r="18" fill="#F37A53"/>

    <!-- Snout -->
    <ellipse cx="0" cy="7" rx="9" ry="6" fill="#F5F0E8"/>

    <!-- Nostrils -->
    <circle cx="-3" cy="7" r="1" fill="#2D2D2D"/>
    <circle cx="3" cy="7" r="1" fill="#2D2D2D"/>

    <!-- Tiny smile -->
    <path d="M -1.5 10 Q 0 11.5 1.5 10" stroke="#2D2D2D" stroke-width="0.9" fill="none" stroke-linecap="round"/>

    <!-- Blush -->
    <circle cx="-11" cy="3" r="2.6" fill="#FFB7D0" opacity="0.8"/>
    <circle cx="11" cy="3" r="2.6" fill="#FFB7D0" opacity="0.8"/>

    <!-- Sparkle eyes -->
    <ellipse cx="-5" cy="-3" rx="2.6" ry="3.4" fill="#2D2D2D"/>
    <circle cx="-4" cy="-4.4" r="1.2" fill="#FFFFFF"/>
    <circle cx="-6" cy="-1.6" r="0.55" fill="#FFFFFF"/>

    <ellipse cx="5" cy="-3" rx="2.6" ry="3.4" fill="#2D2D2D"/>
    <circle cx="4" cy="-4.4" r="1.2" fill="#FFFFFF"/>
    <circle cx="6" cy="-1.6" r="0.55" fill="#FFFFFF"/>
  </g>
</svg>
