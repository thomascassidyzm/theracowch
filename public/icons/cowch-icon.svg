<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Subtle texture grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <!-- Clip spots to the round head so they never spill past the silhouette -->
    <clipPath id="headClip">
      <circle cx="256" cy="280" r="140"/>
    </clipPath>
  </defs>

  <!-- Green rounded card background -->
  <rect width="512" height="512" rx="102" ry="102" fill="#2D5C38"/>
  <rect x="8" y="8" width="496" height="496" rx="94" ry="94" fill="none" stroke="#3D6C48" stroke-width="8"/>

  <!-- Kawaii chibi pink-spot dairy cow -->
  <g transform="translate(256, 280)">

    <!-- Horns (coral) -->
    <ellipse cx="-55" cy="-132" rx="14" ry="24" fill="#F37A53" transform="rotate(-10 -55 -132)"/>
    <ellipse cx="55" cy="-132" rx="14" ry="24" fill="#F37A53" transform="rotate(10 55 -132)"/>

    <!-- Little hair tuft between horns -->
    <path d="M -10 -138 Q 0 -156 10 -138" stroke="#F37A53" stroke-width="8" fill="none" stroke-linecap="round"/>

    <!-- Ears (cream outer, pink inner) -->
    <ellipse cx="-128" cy="-42" rx="42" ry="26" fill="#F5F0E8" transform="rotate(-28 -128 -42)"/>
    <ellipse cx="128" cy="-42" rx="42" ry="26" fill="#F5F0E8" transform="rotate(28 128 -42)"/>
    <ellipse cx="-122" cy="-36" rx="22" ry="13" fill="#FFB7D0" transform="rotate(-28 -122 -36)"/>
    <ellipse cx="122" cy="-36" rx="22" ry="13" fill="#FFB7D0" transform="rotate(28 122 -36)"/>

    <!-- Cream round head -->
    <circle cx="0" cy="0" r="140" fill="#F5F0E8"/>
  </g>

  <!-- Dairy spots (clipped to head circle in absolute coords) -->
  <g clip-path="url(#headClip)">
    <!-- Upper-left forehead spot -->
    <ellipse cx="196" cy="222" rx="36" ry="28" fill="#F37A53" transform="rotate(-18 196 222)"/>
    <!-- Top-right forehead spot -->
    <ellipse cx="316" cy="210" rx="22" ry="18" fill="#F37A53" transform="rotate(20 316 210)"/>
    <!-- Right cheek / jaw spot -->
    <ellipse cx="332" cy="308" rx="30" ry="24" fill="#F37A53" transform="rotate(18 332 308)"/>
    <!-- Lower-left chin spot -->
    <ellipse cx="202" cy="352" rx="24" ry="20" fill="#F37A53" transform="rotate(-24 202 352)"/>
  </g>

  <!-- Face features sit on top of spots -->
  <g transform="translate(256, 280)">

    <!-- Soft pink snout -->
    <ellipse cx="0" cy="50" rx="72" ry="46" fill="#FFD1C0"/>

    <!-- Nostrils -->
    <ellipse cx="-22" cy="50" rx="7" ry="5" fill="#2D2D2D"/>
    <ellipse cx="22" cy="50" rx="7" ry="5" fill="#2D2D2D"/>

    <!-- Tiny smile -->
    <path d="M -12 80 Q 0 92 12 80" stroke="#2D2D2D" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Blush cheeks -->
    <circle cx="-95" cy="25" r="18" fill="#FFB7D0" opacity="0.8"/>
    <circle cx="95" cy="25" r="18" fill="#FFB7D0" opacity="0.8"/>

    <!-- Happy closed-eye arcs ^_^ -->
    <path d="M -64 -18 Q -42 -52 -20 -18" stroke="#2D2D2D" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M 20 -18 Q 42 -52 64 -18" stroke="#2D2D2D" stroke-width="10" fill="none" stroke-linecap="round"/>

    <!-- Eyelash flicks -->
    <path d="M -64 -18 L -72 -26" stroke="#2D2D2D" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 64 -18 L 72 -26" stroke="#2D2D2D" stroke-width="6" fill="none" stroke-linecap="round"/>

  </g>

  <!-- Subtle grain overlay -->
  <rect width="512" height="512" rx="102" ry="102" fill="transparent" filter="url(#grain)"/>
</svg>
